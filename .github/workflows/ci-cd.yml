name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [ published ]

permissions:
  contents: read

jobs:
  quality:
    name: Code Quality & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[quality,test]"

      - name: Run pre-commit
        run: pre-commit run --all-files

  build-check:
    name: Verify Build
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build==1.4.0 twine==6.2.0 check-sdist==1.4.0

      - name: Verify sdist contents
        run: python -m check_sdist --inject-junk

      - name: Build package
        run: python -m build

      - name: Validate metadata with Twine
        run: python -m twine check --strict dist/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-dist
          path: dist/
          retention-days: 7

  tests:
    name: Test on ${{ matrix.os }} (Python ${{ matrix.python-version }})
    needs: build-check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        python-version: [ "3.10", "3.13" ]
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Download built package
        uses: actions/download-artifact@v4
        with:
          name: package-dist
          path: dist/

      - name: Install dependencies and built package
        shell: bash
        run: |
          python -m pip install --upgrade pip
          WHEEL=(dist/*.whl)
          python -m pip install "${WHEEL[0]}[test]"

      - name: Run tests with Pytest
        run: python -m pytest --junitxml=junit.xml --cov-report=xml -o junit_family=legacy

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() && !env.ACT }}
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: ${{ matrix.os }}-py${{ matrix.python-version }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && !env.ACT }}
        uses: codecov/codecov-action@v5
        with:
          report_type: test_results
          files: ./junit.xml
          flags: ${{ matrix.os }}-py${{ matrix.python-version }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  docs-build:
    name: Build Documentation
    needs: quality
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: read

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Configure GitHub Pages
        if: ${{ !env.ACT }}
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"

      - name: Build MkDocs
        run: mkdocs build --strict
        env:
          MKDOCS_SITE_URL: ${{ steps.pages.outputs.base_url }}

      - name: Upload docs HTML artifact
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: site/
          retention-days: 7

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/
          retention-days: 7

  docs-publish:
    name: Publish to GitHub Pages
    needs: [tests, docs-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        if: ${{ !env.ACT }}
        id: deployment
        uses: actions/deploy-pages@v4

  testpypi-publish:
    name: Publish to TestPyPI
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/simple-sklearn

    permissions:
      id-token: write

    steps:
      - name: Download built package
        uses: actions/download-artifact@v4
        with:
          name: package-dist
          path: dist/

      - name: Publish package distributions to TestPyPI
        if: ${{ !env.ACT }}
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0
        with:
          repository-url: https://test.pypi.org/legacy/

  pypi-publish:
    name: Publish to PyPI
    needs: tests
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/simple-sklearn

    permissions:
      id-token: write

    steps:
      - name: Download built package
        uses: actions/download-artifact@v4
        with:
          name: package-dist
          path: dist/

      - name: Publish package distributions to PyPI
        if: ${{ !env.ACT }}
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0
