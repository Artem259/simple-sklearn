name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality:
    name: Code Quality & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[quality,test]"

      - name: Run pre-commit
        run: pre-commit run --all-files

  build-check:
    name: Verify Build
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build==1.4.0 twine==6.2.0

      - name: Build package
        run: python -m build

      - name: Validate metadata with Twine
        run: python -m twine check --strict dist/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-dist
          path: dist/
          retention-days: 1

  tests:
    name: Test on ${{ matrix.os }} (Python ${{ matrix.python-version }})
    needs: build-check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        python-version: [ "3.10", "3.13" ]
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Download built package
        uses: actions/download-artifact@v4
        with:
          name: package-dist
          path: dist/

      - name: Install dependencies and built package
        shell: bash
        run: |
          python -m pip install --upgrade pip
          WHEEL=(dist/*.whl)
          python -m pip install "${WHEEL[0]}[test]"

      - name: Run tests with Pytest
        run: python -m pytest --junitxml=junit.xml --cov-report=xml -o junit_family=legacy

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() && !env.ACT }}
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: ${{ matrix.os }}-py${{ matrix.python-version }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && !env.ACT }}
        uses: codecov/codecov-action@v5
        with:
          report_type: test_results
          files: ./junit.xml
          flags: ${{ matrix.os }}-py${{ matrix.python-version }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
