site_name: simple-sklearn
site_url: !ENV [MKDOCS_SITE_URL, ""]
site_description: ToDo  # TODO
site_author: Artem Poliakov
repo_url: https://github.com/Artem259/simple-sklearn
repo_name: Artem259/simple-sklearn

exclude_docs: |
  notebooks/tools/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocs-jupyter:
      execute: !ENV [EXECUTE_NOTEBOOKS, true]
      allow_errors: false
      ignore_h1_titles: true
  - mkdocstrings:
      handlers:
        python:
          paths: [ src ]
          inventories:
            - https://docs.python.org/3/objects.inv
            - https://scikit-learn.org/stable/objects.inv
            - https://numpy.org/doc/stable/objects.inv
          options:
            docstring_style: google
            show_bases: true
            show_root_heading: true
            show_source: true
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true
            filters:
              - "!^_"

nav:
  - Home: index.md
  - Usage examples:
      - Classification: notebooks/classification.ipynb
      - Clustering: notebooks/clustering.ipynb
      - Tools: notebooks/tools.md
  - API Reference:
      - Overview: reference/index.md
      - Classification: reference/classification/index.md
      - Clustering: reference/clustering/index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: .
